# Render blueprint for the KSP Crime AI backend (FastAPI).
# Deploy: render.com → New → Blueprint → connect this repo.
services:
  - type: web
    name: ksp-crime-ai-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Use the rule-based NLP on the cloud (Ollama can't run on serverless).
      - key: KSP_NLP_PROVIDER
        value: rules
      # Auto-seed the (ephemeral) SQLite DB on first boot.
      - key: KSP_AUTOSEED
        value: "true"
      # Signing secret — Render generates a random value.
      - key: KSP_SECRET_KEY
        generateValue: true
      # Set this to your Slate frontend URL in the Render dashboard, e.g.
      #   https://ksp-xxxx.development.catalystserverless.in
      - key: KSP_CORS_ORIGINS
        sync: false
